version: '3.9'
services:
  postgres-appointment:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: AppointmentSchedulingService
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
